<!DOCTYPE html>
<html lang="en">
<head>

<title>SAAD – Self-Assembly & Aggregation Disease Database</title>
<meta name="description" content="Comprehensive open-access database of self-assembling peptides, proteins and mutations leading to disease. Curated from peer-reviewed literature."/>
<meta name="keywords" content="amyloid, self-assembly, aggregation, peptide, NMR, disease database, Alzheimer, Parkinson, ALS"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes glow{0%,100%{box-shadow:0 0 16px rgba(59,130,246,.4)}50%{box-shadow:0 0 32px rgba(6,182,212,.7)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes bounceIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes dnaRotate{0%{transform:rotateY(0deg)}100%{transform:rotateY(360deg)}}

*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#050d1a}
::-webkit-scrollbar-thumb{background:#1e3a6e;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#2563eb}

html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:#050d1a;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit;transition:opacity .15s}
a:hover{opacity:.8}
input,select,textarea{font-family:'Inter',inherit;font-size:13px;padding:9px 12px;border:1px solid #1e3a5f;border-radius:8px;outline:none;background:#0d1f35;color:#e2e8f0;width:100%;transition:border-color .2s,box-shadow .2s}

select option{background:#0d1f35;color:#e2e8f0}
textarea{resize:vertical}
button{font-family:'Inter',inherit;cursor:pointer;border:none;outline:none;transition:all .18s}
button:active{transform:scale(.97)}

/* ── PARTICLES BACKGROUND ── */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;animation:float linear infinite;opacity:.3}

/* ── NAV ── */
#nav{background:rgba(5,13,26,.92);backdrop-filter:blur(16px);border-bottom:1px solid #1e3a5f;padding:0 20px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:200;gap:8px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#06b6d4);display:flex;align-items:center;justiy-content:center;font-weight:900;font-size:15px;color:#fff;animation:glow 3s infinite;flex-shrink:0;justify-content:center}
.logo-text{font-size:15px;font-weight:800;letter-spacing:-.5px;line-height:1}
.logo-sub{font-size:8px;color:#64748b;letter-spacing:.08em;margin-top:1px}
.nav-links{display:flex;flex:1;gap:1px;overflow-x:auto;padding:0 8px}
.nav-btn{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;border:1px solid transparent;background:transparent;color:#94a3b8}
.nav-btn.active{background:rgba(59,130,246,.15);color:#60a5fa;border-color:rgba(59,130,246,.3)}
.nav-btn:hover:not(.active){background:rgba(255,255,255,.05);color:#e2e8f0}
.nav-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
.btn-ghost{padding:5px 12px;font-size:12px;border-radius:6px;border:1px solid #1e3a5f;color:#94a3b8;background:transparent;cursor:pointer}
.btn-primary{padding:6px 14px;font-size:12px;border-radius:6px;border:none;color:#fff;background:linear-gradient(135deg,#3b82f6,#0ea5e9);cursor:pointer;font-weight:700}
.admin-badge{font-size:9px;font-weight:800;color:#fbbf24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);padding:3px 8px;border-radius:4px;letter-spacing:.06em}

/* ── MODALS ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease;padding:16px}
.modal{background:#0d1f35;border:1px solid #1e3a5f;border-radius:16px;padding:32px;animation:fadeUp .25s ease;box-shadow:0 28px 70px rgba(0,0,0,.8);max-height:90vh;overflow-y:auto}
.modal-sm{width:min(400px,100%)}
.modal-md{width:min(640px,100%)}
.modal-lg{width:min(820px,100%)}
.tab-row{display:flex;background:#08111f;border-radius:8px;padding:3px;margin-bottom:20px}
.tab-btn{flex:1;padding:7px;font-size:12px;font-weight:700;border-radius:6px;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.tab-active{background:#3b82f6;color:#fff}
.tab-inactive{background:transparent;color:#64748b}
.form-row{display:grid;gap:14px;margin-bottom:14px}
.form-row-2{grid-template-columns:1fr 1fr}
.form-group{margin-bottom:14px}
label.lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#64748b;margin-bottom:5px;display:block}
.err-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;padding:8px 12px;border-radius:7px;font-size:12px;margin-bottom:12px}
.btn-full{width:100%;padding:11px;background:linear-gradient(135deg,#3b82f6,#0ea5e9);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(59,130,246,.4);margin-bottom:10px}
.btn-cancel{width:100%;padding:7px;background:transparent;color:#64748b;border:none;font-size:12px;cursor:pointer;font-family:inherit}

/* ── CARDS / COMMON ── */
.card{background:#0d1f35;border:1px solid #1e3a5f;border-radius:12px;padding:20px}
.card-hover{transition:border-color .2s,transform .15s}
.card-hover:hover{border-color:#3b82f6;transform:translateY(-2px)}
.section{max-width:1280px;margin:0 auto;padding:28px 20px}
.section-title{font-size:1.6rem;font-weight:800;color:#e2e8f0;margin-bottom:6px;letter-spacing:-.5px}
.section-sub{color:#64748b;font-size:13px;margin-bottom:24px;line-height:1.7}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em}
.badge-amyloid{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.badge-assembly{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.25)}
.badge-aggregation{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.badge-prion{background:rgba(139,92,246,.1);color:#a78bfa;border:1px solid rgba(139,92,246,.2)}
.badge-nmr{background:rgba(6,182,212,.12);color:#22d3ee;border:1px solid rgba(6,182,212,.25);animation:pulse 2s infinite}
.badge-cryo{background:rgba(16,185,129,.1);color:#34d399;border:1px solid rgba(16,185,129,.2)}
.badge-xray{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.badge-future{background:rgba(99,102,241,.1);color:#818cf8;border:1px solid rgba(99,102,241,.2)}
.badge-disease{background:rgba(239,68,68,.08);color:#fca5a5;border:1px solid rgba(239,68,68,.15);font-size:9px}

/* ── HERO ── */
#hero{position:relative;overflow:hidden;padding:80px 20px 64px;text-align:center;border-bottom:1px solid #1e3a5f;background:radial-gradient(ellipse 100% 70% at 50% 0%,rgba(59,130,246,.08) 0%,transparent 70%)}
.hero-tag{display:inline-block;padding:4px 16px;border-radius:20px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#60a5fa;font-size:11px;font-weight:700;letter-spacing:.1em;margin-bottom:20px}
.hero-title{font-size:clamp(2rem,5vw,3rem);font-weight:900;line-height:1.1;margin-bottom:16px;letter-spacing:-2px}
.grad-blue{background:linear-gradient(135deg,#06b6d4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.grad-cyan{background:linear-gradient(135deg,#3b82f6,#0ea5e9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-desc{font-size:1rem;color:#94a3b8;max-width:620px;margin:0 auto 32px;line-height:1.85}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-hero-primary{padding:13px 32px;font-size:14px;font-weight:800;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#06b6d4);color:#fff;border:none;cursor:pointer;box-shadow:0 6px 22px rgba(59,130,246,.45);font-family:inherit}
.btn-hero-ghost{padding:13px 32px;font-size:14px;font-weight:700;border-radius:10px;background:rgba(255,255,255,.04);color:#e2e8f0;border:1px solid #1e3a5f;cursor:pointer;font-family:inherit}
.dna-float{position:absolute;font-size:60px;opacity:.05;animation:float 6s ease-in-out infinite}
.dna1{top:10%;left:5%;animation-delay:0s}
.dna2{top:20%;right:8%;animation-delay:-3s}
.dna3{bottom:15%;left:15%;animation-delay:-1.5s}

/* ── STATS BAR ── */
.stats-bar{background:#08111f;border-bottom:1px solid #1e3a5f;padding:18px 20px}
.stats-grid{max-width:900px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.stat-item{text-align:center;padding:12px;border-radius:10px;background:#0d1f35;border:1px solid #1e3a5f}
.stat-num{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,#06b6d4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-lbl{font-size:10px;color:#64748b;margin-top:2px;font-weight:600;letter-spacing:.04em}

/* ── TABLE ── */
.table-wrap{background:#0d1f35;border:1px solid #1e3a5f;border-radius:12px;overflow:hidden}
.db-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.db-table thead tr{background:#08111f;border-bottom:1px solid #1e3a5f}
.db-table th{padding:10px 8px;text-align:left;font-size:10px;font-weight:700;color:#64748b;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;user-select:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.db-table th:hover{color:#60a5fa}
.db-table tbody tr{border-bottom:1px solid rgba(30,58,95,.5);cursor:pointer;transition:background .12s}
.db-table tbody tr:nth-child(odd){background:#0d1f35}
.db-table tbody tr:nth-child(even){background:#08111f}
.db-table tbody tr:hover{background:rgba(59,130,246,.08);border-bottom-color:rgba(59,130,246,.2)}
.db-table td{padding:9px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.seq-mono{font-family:'JetBrains Mono',monospace;font-size:9px;color:#22d3ee;background:rgba(6,182,212,.07);padding:1px 5px;border-radius:3px;display:inline-block;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── FILTER BAR ── */
.filter-bar{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr auto;gap:8px;margin-bottom:14px;align-items:center}

/* ── PAGINATION ── */
.pagination{display:flex;gap:5px;justify-content:center;align-items:center;margin-top:16px;font-size:12px}
.pg-btn{padding:6px 11px;border-radius:7px;border:1px solid #1e3a5f;background:#0d1f35;color:#94a3b8;cursor:pointer;font-family:inherit;transition:all .15s}
.pg-btn.active{border-color:#3b82f6;background:rgba(59,130,246,.15);color:#60a5fa;font-weight:700}
.pg-btn:disabled{opacity:.35;cursor:default}

/* ── DETAIL MODAL ── */
.detail-seq{font-family:'JetBrains Mono',monospace;font-size:12px;color:#22d3ee;background:rgba(6,182,212,.07);border:1px solid rgba(6,182,212,.15);padding:12px;border-radius:8px;word-break:break-all;line-height:1.8}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.detail-box{background:#08111f;border-radius:8px;padding:10px}
.detail-box-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#64748b;margin-bottom:5px;display:block}
.detail-box-val{font-size:12px;color:#e2e8f0;word-break:break-word;line-height:1.5}
.notes-box{background:#08111f;border-radius:8px;padding:12px;margin-bottom:14px}
.link-row{display:flex;gap:8px;flex-wrap:wrap}
.link-btn{padding:8px 16px;border-radius:7px;font-size:12px;font-weight:700;display:inline-block}
.link-pub{background:linear-gradient(135deg,#3b82f6,#0ea5e9);color:#fff}
.link-pdb{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.link-mol{background:rgba(6,182,212,.1);color:#22d3ee;border:1px solid rgba(6,182,212,.2)}

/* ── 3D MOLECULE VISUAL ── */
.mol-visual{width:100%;height:160px;background:radial-gradient(circle at 50%,rgba(59,130,246,.08),transparent);border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(59,130,246,.1);position:relative;overflow:hidden;margin-bottom:12px}
.mol-svg{width:120px;height:120px}
.mol-bg-ring{position:absolute;border-radius:50%;border:1px solid rgba(59,130,246,.08)}

/* ── DISEASE CATEGORIES ── */
.dis-card{background:#0d1f35;border:1px solid #1e3a5f;border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.dis-card:hover{border-color:#3b82f6;transform:translateY(-2px)}
.dis-icon{font-size:28px;margin-bottom:10px}
.dis-name{font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:4px}
.dis-count{font-size:11px;color:#64748b}
.dis-bar{height:3px;border-radius:2px;margin-top:10px;background:linear-gradient(90deg,#3b82f6,#06b6d4)}

/* ── NMR HIGHLIGHT ── */
.nmr-card{background:linear-gradient(135deg,rgba(6,182,212,.08),rgba(59,130,246,.05));border:1px solid rgba(6,182,212,.2);border-radius:12px;padding:20px;position:relative;overflow:hidden}
.nmr-badge{position:absolute;top:12px;right:12px;background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.3);color:#22d3ee;font-size:9px;font-weight:800;padding:3px 8px;border-radius:4px;letter-spacing:.08em;animation:pulse 2s infinite}
.nmr-pulse{position:absolute;inset:-20px;background:radial-gradient(circle at 80% 20%,rgba(6,182,212,.04),transparent 50%);pointer-events:none}

/* ── FUTURE STUDIES ── */
.future-card{background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(139,92,246,.05));border:1px solid rgba(99,102,241,.2);border-radius:12px;padding:18px}
.future-tag{font-size:9px;font-weight:800;color:#818cf8;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.future-title{font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:6px}
.future-desc{font-size:12px;color:#94a3b8;line-height:1.7}

/* ── PATHWAY DIAGRAM ── */
.pathway{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:16px;background:rgba(59,130,246,.04);border:1px solid rgba(59,130,246,.12);border-radius:10px}
.path-node{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700}
.path-arrow{color:#1e3a5f;font-weight:800;font-size:18px}

/* ── ADMIN PANEL ── */
.admin-stat{background:#0d1f35;border:1px solid #1e3a5f;border-radius:12px;padding:18px;text-align:center}
.admin-stat-num{font-size:2.2rem;font-weight:900}
.admin-stat-lbl{font-size:11px;color:#64748b;margin-top:3px;font-weight:600;letter-spacing:.04em}
.action-btn{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-approve{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.2)}
.btn-reject{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.btn-delete{background:rgba(255,255,255,.03);color:#64748b;border:1px solid #1e3a5f}
.status-badge{padding:3px 10px;border-radius:8px;font-size:10px;font-weight:800;letter-spacing:.04em}
.status-pending{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.status-approved{background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.2)}
.status-rejected{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}

/* ── FOOTER ── */
#footer{background:#08111f;border-top:1px solid #1e3a5f;padding:28px 20px;margin-top:60px;text-align:center}
.footer-logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.footer-sub{font-size:12px;color:#64748b;margin-bottom:5px}
.footer-copy{font-size:11px;color:#1e3a5f}
.footer-link{color:#60a5fa;font-weight:600}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .filter-bar{grid-template-columns:1fr 1fr;}.grid-3{grid-template-columns:1fr 1fr}.grid-4{grid-template-columns:1fr 1fr}.stats-grid{grid-template-columns:repeat(3,1fr)}.grid-2{grid-template-columns:1fr}.detail-grid{grid-template-columns:1fr}.form-row-2{grid-template-columns:1fr}
}
@media(max-width:480px){
  .grid-3{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}
}
</style>

{id:7,name:"Tau PHF6 (306-VQIVYK-311)",sn:"PHF6",type:"Amyloid",cat:"Neurological",disease:"Alzheimer's disease",seq:"VQIVYK",pdb:"3OVL",meth:"ssNMR, X-ray, MicroED",cond:"pH 7.4, HEPES buffer",nmr:true,cryo:false,doi:"10.1073/pnas.0107180098",ref:"von Bergen M et al., PNAS 2001, 98(20):11307-11312",year:2001,notes:"Core hexapeptide of tau R3 repeat. Steric zipper with class 1 symmetry. Drives PHF formation. Critical drug target for tauopathies.",inhibitor:"Methylene blue, EGCG, Anle138b",mechanism:"Steric zipper, parallel in-register β-sheet"},

/* ── PARKINSON'S DISEASE ── */

  {id:10,title:"Autism Spectrum Disorder SHANK3 Aggregation",cat:"Neurological",desc:"SHANK3 mutations affect postsynaptic density protein organization. Whether SHANK3 undergoes aggregation at synapses is an emerging area of autism biology.",evidence:"Monteiro P & Bhatt DL, 2012; protein bioinformatics predictions",hypothesis:"SHANK3 C-terminal mutations promote synaptic scaffold aggregation causing dendritic spine collapse"},
  {id:11,title:"Psoriasis Antimicrobial Amyloid (LL-37)",cat:"Skin",desc:"LL-37 (cathelicidin) forms amyloid-like complexes with self-DNA, activating TLR9 and triggering psoriatic autoimmunity. Role of amyloid conformation in autoinflammatory signaling.",evidence:"Lande R et al., Nature 2007, 449:564-569",hypothesis:"LL-37 amyloid-DNA complexes are the key inflammatory trigger in psoriasis"},

/* ── MOLECULE 3D VISUALIZATION (SVG) ── */
function Mol3D({type}) {
  const colors = {Amyloid:["#ef4444","#f87171"],
    "Self-Assembly":["#3b82f6","#60a5fa"],
    Aggregation:["#f59e0b","#fbbf24"],
    Functional:["#8b5cf6","#a78bfa"]};
  const [c1,c2] = colors[type]||colors["Amyloid"];
  return (
    <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" className="mol-svg">
      <defs>
        <radialGradient id={`g${type}`} cx="40%" cy="35%">
          <stop offset="0%" stopColor={c2} stopOpacity=".9"/>
          <stop offset="100%" stopColor={c1} stopOpacity=".4"/>
        </radialGradient>
        <filter id="blur"><feGaussianBlur stdDeviation="2"/></filter>
      </defs>
      {/* Atoms */}
      <circle cx="60" cy="60" r="22" fill={`url(#g${type})`} opacity=".8"/>
      <circle cx="60" cy="60" r="22" fill="none" stroke={c1} strokeWidth="1" opacity=".5"/>
      <circle cx="28" cy="40" r="12" fill={c2} opacity=".6"/>
      <circle cx="90" cy="35" r="9" fill={c1} opacity=".5"/>
      <circle cx="85" cy="82" r="11" fill={c2} opacity=".55"/>
      <circle cx="30" cy="82" r="8" fill={c1} opacity=".45"/>
      <circle cx="60" cy="15" r="7" fill={c2} opacity=".4"/>
      {/* Bonds */}
      <line x1="40" y1="47" x2="55" y2="53" stroke={c1} strokeWidth="2" opacity=".6"/>
      <line x1="82" y1="42" x2="75" y2="50" stroke={c1} strokeWidth="2" opacity=".5"/>
      <line x1="78" y1="74" x2="72" y2="68" stroke={c1} strokeWidth="2" opacity=".5"/>
      <line x1="38" y1="74" x2="48" y2="68" stroke={c1} strokeWidth="2" opacity=".5"/>
      <line x1="56" y1="38" x2="58" y2="50" stroke={c1} strokeWidth="1.5" opacity=".4"/>
      {/* Glow */}
      <circle cx="60" cy="60" r="28" fill="none" stroke={c1} strokeWidth=".5" opacity=".25" filter="url(#blur)"/>
      {/* Highlight */}
      <circle cx="50" cy="50" r="6" fill="white" opacity=".15"/>
    </svg>
  );
}

/* ── BADGE COMPONENT ── */
function TBadge({t}) {
  const cls = {Amyloid:"badge badge-amyloid","Self-Assembly":"badge badge-assembly",Aggregation:"badge badge-aggregation",Prion:"badge badge-prion"}[t]||"badge badge-aggregation";
  return <span className={cls}>{t}</span>;
}
function MethBadge({m}) {
  if(m.nmr) return <span className="badge badge-nmr" title="NMR characterized">NMR ✓</span>;
  if(m.cryo) return <span className="badge badge-cryo" title="CryoEM structure">CryoEM ✓</span>;
  return null;
}

              </div>
              <div className="form-row form-row-2">
                <div><label className="lbl">DOI * (will be verified)</label><input placeholder="e.g. 10.1073/pnas.0506723102" value={subF.doi} onChange={e=>setSubF({...subF,doi:e.target.value})}/></div>
                <div><label className="lbl">Publication Year</label><input placeholder="e.g. 2023" value={subF.year} onChange={e=>setSubF({...subF,year:e.target.value})}/></div>
              </div>
              <div className="form-group"><label className="lbl">Full Reference (ACS style)</label><input placeholder="Author AA et al., J Name Year, Vol:Pages" value={subF.ref} onChange={e=>setSubF({...subF,ref:e.target.value})}/></div>
              <div className="form-group"><label className="lbl">Mechanism of Aggregation</label><textarea placeholder="Describe the molecular mechanism…" style={{minHeight:"60px"}} value={subF.mechanism} onChange={e=>setSubF({...subF,mechanism:e.target.value})}/></div>
              <div className="form-group"><label className="lbl">Known Inhibitors / Therapeutics</label><input placeholder="e.g. EGCG, tafamidis, lecanemab" value={subF.inhibitor} onChange={e=>setSubF({...subF,inhibitor:e.target.value})}/></div>
              <div className="form-group"><label className="lbl">Additional Notes</label><textarea placeholder="Scientific context, significance, disease relevance…" style={{minHeight:"80px"}} value={subF.notes} onChange={e=>setSubF({...subF,notes:e.target.value})}/></div>
              <button className="btn-full" onClick={doSubMol}>Submit for DOI Verification & Review →</button>
              <p style={{fontSize:"11px",color:"#64748b",textAlign:"center"}}>The administrator will verify the DOI and cross-check the data before publication. Only peer-reviewed, experimental data accepted.</p>
            </div>
          )}
        </div>
      )}

      {/* ═══════════════ PUBLICATIONS ═══════════════ */}
      {pg==="publications"&&(
        <div className="section" style={{maxWidth:"960px"}}>
          <h1 className="section-title">Key References</h1>
          <p className="section-sub">All database entries are linked to DOI-verified peer-reviewed publications. The references below are landmark papers in the field, grouped by category.</p>
          {["Amyloid","Self-Assembly","Aggregation"].map(type=>(
            <div key={type} style={{marginBottom:"32px"}}>
              <h2 style={{fontSize:"1.1rem",fontWeight:"700",color:"#e2e8f0",marginBottom:"14px",paddingBottom:"8px",borderBottom:"1px solid #1e3a5f"}}>{type} References</h2>
              <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                {MOLS.filter(m=>m.type===type).slice(0,8).map((m,i)=>(
                  <div key={m.id} className="card" style={{display:"flex",gap:"14px",alignItems:"flex-start"}}>
                    <div style={{width:"34px",height:"34px",borderRadius:"50%",background:`linear-gradient(135deg,#3b82f6,#06b6d4)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:"800",color:"#fff",flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"13px",fontWeight:"700",color:"#e2e8f0",marginBottom:"4px",lineHeight:"1.5"}}>{m.ref}</div>
                      <div style={{display:"flex",gap:"10px",alignItems:"center",flexWrap:"wrap"}}>
                        <span style={{fontSize:"11px",color:"#64748b"}}>{m.name} · {m.disease}</span>
                        <a href={`https://doi.org/${m.doi}`} target="_blank" rel="noreferrer" style={{fontSize:"11px",color:"#0ea5e9",fontWeight:"700",background:"rgba(14,165,233,.08)",padding:"2px 8px",borderRadius:"4px",border:"1px solid rgba(14,165,233,.15)"}}>doi:{m.doi} ↗</a>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:"4px",flexShrink:0}}>
                      {m.nmr&&<span className="badge badge-nmr" style={{animation:"none",fontSize:"9px"}}>NMR</span>}
                      {m.cryo&&<span className="badge badge-cryo" style={{fontSize:"9px"}}>Cryo</span>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ═══════════════ CONTACT ═══════════════ */}
      {pg==="contact"&&(
        <div className="section" style={{maxWidth:"820px"}}>
          <h1 className="section-title">Contact & Suggestions</h1>
          <p className="section-sub">Send feedback, data corrections, or new entry suggestions. All messages go directly to the SAAD administrator for personal review.</p>
          {sugOk?(
            <div className="card" style={{textAlign:"center",padding:"44px",background:"rgba(16,185,129,.06)",border:"1px solid rgba(16,185,129,.18)"}}>
              <div style={{fontSize:"50px",marginBottom:"14px"}}>✉️</div>
              <h3 style={{fontSize:"19px",fontWeight:"800",color:"#10b981",marginBottom:"8px"}}>Message Submitted!</h3>
              <p style={{color:"#64748b",fontSize:"13px",marginBottom:"22px"}}>The administrator will review and respond via email.</p>
              <button onClick={()=>setSugOk(false)} style={{padding:"9px 22px",background:"rgba(16,185,129,.12)",color:"#10b981",border:"1px solid rgba(16,185,129,.2)",borderRadius:"8px",fontSize:"13px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"}}>Send Another</button>
            </div>
          ):(
            <div className="grid-2">
              <div className="card">
                <h3 style={{fontSize:"15px",fontWeight:"800",color:"#e2e8f0",marginBottom:"18px"}}>Send a Message</h3>
                <div className="form-group"><label className="lbl">Your Name *</label><input placeholder="Dr. Jane Smith" value={sugF.name} onChange={e=>setSugF({...sugF,name:e.target.value})}/></div>
                <div className="form-group"><label className="lbl">Your Email *</label><input type="email" placeholder="you@university.edu" value={sugF.email} onChange={e=>setSugF({...sugF,email:e.target.value})}/></div>
                <div className="form-group"><label className="lbl">Institution</label><input placeholder="University / Research Institute" value={sugF.institution} onChange={e=>setSugF({...sugF,institution:e.target.value})}/></div>
                <div className="form-group"><label className="lbl">Subject</label>
                  <select value={sugF.subject} onChange={e=>setSugF({...sugF,subject:e.target.value})}>
                    {["General Feedback","New Molecule Suggestion","Data Correction / Error","Missing Reference","Collaboration Proposal","Other"].map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
                <div className="form-group"><label className="lbl">Message *</label><textarea style={{minHeight:"100px"}} placeholder="Describe your feedback or suggestion in detail…" value={sugF.msg} onChange={e=>setSugF({...sugF,msg:e.target.value})}/></div>
                <div style={{borderTop:"1px solid #1e3a5f",paddingTop:"14px",marginBottom:"14px"}}>
                  <div style={{fontSize:"10px",fontWeight:"800",letterSpacing:".08em",textTransform:"uppercase",color:"#64748b",marginBottom:"10px"}}>Suggest a New Entry (optional)</div>
                  <input style={{marginBottom:"8px"}} placeholder="Molecule / peptide name" value={sugF.molName} onChange={e=>setSugF({...sugF,molName:e.target.value})}/>
                  <input placeholder="DOI of reference publication" value={sugF.molDoi} onChange={e=>setSugF({...sugF,molDoi:e.target.value})}/>
                </div>
                <button className="btn-full" onClick={doSubSug}>Send Message →</button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
                <div className="card">
                  <div style={{fontSize:"10px",fontWeight:"800",letterSpacing:".08em",color:"#64748b",marginBottom:"14px",textTransform:"uppercase"}}>Administrator</div>
                  <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"14px"}}>
                    <div style={{width:"46px",height:"46px",borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#06b6d4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",fontWeight:"900",color:"#fff",flexShrink:0}}>AR</div>
                    <div>
                      <div style={{fontWeight:"800",color:"#e2e8f0",fontSize:"14px"}}>Amal Roy</div>
                      <div style={{fontSize:"11px",color:"#64748b"}}>SAAD Creator & Prime Administrator</div>
                    </div>
                  </div>
                  <a href={`mailto:${ADMIN_EMAIL}`} style={{display:"block",padding:"9px 12px",background:"rgba(59,130,246,.08)",border:"1px solid rgba(59,130,246,.15)",borderRadius:"8px",fontSize:"12px",color:"#60a5fa",fontWeight:"600"}}>{ADMIN_EMAIL}</a>
                  <div style={{marginTop:"10px",display:"inline-block",padding:"4px 12px",borderRadius:"6px",background:"rgba(251,191,36,.08)",border:"1px solid rgba(251,191,36,.15)",fontSize:"10px",fontWeight:"800",color:"#fbbf24",letterSpacing:".06em"}}>PRIME OWNER</div>
                </div>
                <div className="card">
                  <div style={{fontSize:"10px",fontWeight:"800",letterSpacing:".08em",color:"#64748b",marginBottom:"12px",textTransform:"uppercase"}}>Submission Policy</div>
                  {["All entries must have DOI-verifiable peer-reviewed literature.","No unpublished or preprint-only data accepted in main database.","Computational predictions must be clearly labeled.","Admin verifies DOI and cross-checks data before publication.","Corrections welcomed — scientific accuracy is the priority."].map((t,i)=>(
                    <div key={i} style={{display:"flex",gap:"10px",marginBottom:"10px",alignItems:"flex-start"}}>
                      <div style={{width:"20px",height:"20px",borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#06b6d4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:"900",color:"#fff",flexShrink:0}}>{i+1}</div>
                      <div style={{fontSize:"12px",color:"#64748b",lineHeight:"1.65"}}>{t}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ═══════════════ ABOUT ═══════════════ */}
      {pg==="about"&&(
        <div className="section" style={{maxWidth:"820px"}}>
          <div style={{textAlign:"center",marginBottom:"36px"}}>
            <div style={{width:"58px",height:"58px",borderRadius:"14px",background:"linear-gradient(135deg,#3b82f6,#06b6d4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px",fontWeight:"900",color:"#fff",margin:"0 auto 16px",animation:"glow 3s infinite"}}>S</div>
            <h1 style={{fontSize:"2rem",fontWeight:"900",color:"#e2e8f0",marginBottom:"8px",letterSpacing:"-0.7px"}}>About SAAD v2.0</h1>
            <p style={{color:"#64748b",fontSize:"14px",maxWidth:"500px",margin:"0 auto",lineHeight:"1.8"}}>Self-Assembly & Aggregation Disease Database — a comprehensive open-access scientific resource for the global research community.</p>
          </div>
          <div className="grid-2" style={{marginBottom:"24px"}}>
            {[{t:"Mission",d:"SAAD provides comprehensive, open-access data on molecular self-assembly and aggregation leading to disease — all entries verified with DOI-linked peer-reviewed publications in Nature, Science, PNAS, Cell, JACS and specialty journals."},{t:"Scope",d:"Covers peptides, proteins, genes and mutations causing pathological aggregation from brain diseases (Alzheimer's, Parkinson's, ALS) to metabolic (T2D, insulin), cardiovascular (TTR amyloidosis), hormonal, cancer-related, muscular, ocular, and skin diseases."},{t:"Scientific Standards",d:"Every entry: (1) DOI-verified, (2) peer-reviewed experimental data only, (3) aggregation mechanism documented, (4) inhibitors/therapeutics listed where applicable, (5) NMR/CryoEM badge for structural entries. No computational predictions without labeling."},{t:"Target Audience",d:"Primarily for PhD students, postdoctoral researchers, professors, and biotechnology researchers in structural biology, biochemistry, NMR spectroscopy, materials science, and drug discovery."}].map(f=>(
              <div key={f.t} className="card">
                <div style={{fontSize:"10px",fontWeight:"800",letterSpacing:".08em",textTransform:"uppercase",color:"#60a5fa",marginBottom:"8px"}}>{f.t}</div>
                <p style={{color:"#64748b",fontSize:"13px",lineHeight:"1.75"}}>{f.d}</p>
              </div>
            ))}
          </div>
          <div className="card" style={{background:"linear-gradient(135deg,rgba(59,130,246,.1),rgba(6,182,212,.07))",border:"1px solid rgba(59,130,246,.2)",display:"flex",alignItems:"center",gap:"16px",marginBottom:"16px",flexWrap:"wrap"}}>
            <div style={{width:"54px",height:"54px",borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#06b6d4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",fontWeight:"900",color:"#fff",flexShrink:0}}>AR</div>
            <div style={{flex:1}}>
              <div style={{fontSize:"17px",fontWeight:"900",color:"#e2e8f0",marginBottom:"2px"}}>Amal Roy</div>
              <div style={{fontSize:"12px",color:"#0ea5e9",marginBottom:"6px"}}>Creator, Curator & Prime Administrator · SAAD v2.0</div>
              <a href={`mailto:${ADMIN_EMAIL}`} style={{fontSize:"13px",color:"#60a5fa",fontWeight:"700"}}>{ADMIN_EMAIL}</a>
            </div>
            <div style={{padding:"6px 14px",borderRadius:"8px",background:"rgba(251,191,36,.1)",border:"1px solid rgba(251,191,36,.2)",color:"#fbbf24",fontSize:"11px",fontWeight:"800",letterSpacing:".06em"}}>PRIME OWNER</div>
          </div>
          <div style={{padding:"14px 18px",borderRadius:"10px",background:"#08111f",border:"1px solid #1e3a5f",fontSize:"12px",color:"#64748b",lineHeight:"1.7"}}>
            SAAD v2.0 · All data sourced from DOI-verified peer-reviewed literature · Links to RCSB PDB, Mol*, iCn3D, PubMed · Inspired by SAPdb (Mathur et al., 2021) · © 2025 Amal Roy · Open-access scientific platform
          </div>
        </div>
      )}

      {/* ═══════════════ ADMIN ═══════════════ */}
      {pg==="admin"&&user?.role==="admin"&&(
        <div className="section">
          <div style={{display:"flex",gap:"12px",alignItems:"center",marginBottom:"6px"}}>
            <h1 className="section-title" style={{marginBottom:0}}>Admin Dashboard</h1>
            <span className="admin-badge">PRIME OWNER</span>
          </div>
          <p className="section-sub">Logged in as {user.email} · Full control over all database content, submissions, and messages</p>
          <div className="grid-4" style={{marginBottom:"28px"}}>
            {[{l:"Total Entries",v:MOLS.length,c:"#3b82f6"},{l:"Pending",v:subs.filter(s=>s.status==="pending").length,c:"#fbbf24"},{l:"Approved",v:subs.filter(s=>s.status==="approved").length,c:"#10b981"},{l:"Messages",v:sugs.length,c:"#06b6d4"}].map(s=>(
              <div key={s.l} className="admin-stat">
                <div className="admin-stat-num" style={{color:s.c}}>{s.v}</div>
                <div className="admin-stat-lbl">{s.l}</div>
              </div>
            ))}
          </div>
          <h2 style={{fontSize:"1.2rem",fontWeight:"800",color:"#e2e8f0",marginBottom:"14px"}}>User Submissions (pending DOI verification)</h2>
          {subs.length===0?(
            <div className="card" style={{textAlign:"center",padding:"28px",color:"#64748b",fontSize:"13px",marginBottom:"28px"}}>No submissions yet.</div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"28px"}}>
              {subs.map(s=>(
                <div key={s.id} className="card">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
                    <div>
                      <div style={{fontWeight:"800",color:"#e2e8f0",fontSize:"14px"}}>{s.name}</div>
                      <div style={{fontSize:"11px",color:"#64748b",marginTop:"3px"}}>By: {s.byName} · {s.by} · {new Date(s.at).toLocaleDateString()}</div>
                    </div>
                    <span className={`status-badge ${s.status==="pending"?"status-pending":s.status==="approved"?"status-approved":"status-rejected"}`}>{s.status.toUpperCase()}</span>
                  </div>
                  <div style={{fontSize:"12px",color:"#64748b",marginBottom:"8px"}}>Type: {s.type} · Category: {s.cat} · Disease: {s.disease} · Method: {s.method}</div>
                  <div style={{fontSize:"12px",color:"#0ea5e9",marginBottom:"8px"}}>DOI: {s.doi}</div>
                  {s.notes&&<div style={{fontSize:"12px",color:"#94a3b8",marginBottom:"10px",fontStyle:"italic",lineHeight:"1.6"}}>{s.notes}</div>}
                  <div style={{display:"flex",gap:"8px"}}>
                    {s.status==="pending"&&<>
                      <button className="action-btn btn-approve" onClick={()=>appSub(s.id)}>✓ Approve</button>
                      <button className="action-btn btn-reject" onClick={()=>rejSub(s.id)}>✗ Reject</button>
                    </>}
                    <button className="action-btn btn-delete" onClick={()=>delSub(s.id)}>Delete</button>
                  </div>
                </div>
              ))}
            </div>
          )}
          <h2 style={{fontSize:"1.2rem",fontWeight:"800",color:"#e2e8f0",marginBottom:"14px"}}>Contact Messages</h2>
          {sugs.length===0?(
            <div className="card" style={{textAlign:"center",padding:"28px",color:"#64748b",fontSize:"13px"}}>No messages yet.</div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              {sugs.map(s=>(
                <div key={s.id} className="card">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
                    <div>
                      <div style={{fontWeight:"800",color:"#e2e8f0",fontSize:"14px"}}>{s.name} — {s.subject}</div>
                      <a href={`mailto:${s.email}`} style={{fontSize:"12px",color:"#0ea5e9",fontWeight:"600"}}>{s.email}</a>
                      {s.institution&&<span style={{fontSize:"11px",color:"#64748b",marginLeft:"8px"}}>· {s.institution}</span>}
                    </div>
                    <span style={{fontSize:"11px",color:"#64748b"}}>{new Date(s.at).toLocaleDateString()}</span>
                  </div>
                  <div style={{fontSize:"13px",color:"#94a3b8",marginBottom:"10px",lineHeight:"1.7"}}>{s.msg}</div>
                  {(s.molName||s.molDoi)&&<div style={{background:"#08111f",borderRadius:"7px",padding:"10px",fontSize:"12px",color:"#64748b",marginBottom:"10px"}}>
                    {s.molName&&<div>Molecule: {s.molName}</div>}
                    {s.molDoi&&<div>DOI: {s.molDoi}</div>}
                  </div>}
                  <div style={{display:"flex",gap:"8px"}}>
                    <a href={`mailto:${s.email}?subject=Re: ${encodeURIComponent(s.subject)}&body=Dear ${encodeURIComponent(s.name)},`} className="link-btn link-pub" style={{fontSize:"11px",padding:"6px 14px"}}>Reply via Email ↗</a>
                    <button className="action-btn btn-delete" onClick={()=>delSug(s.id)}>Delete</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      {pg==="admin"&&user?.role!=="admin"&&<div style={{textAlign:"center",padding:"60px",color:"#64748b"}}>Access denied.</div>}

      {/* FOOTER */}
      <div id="footer">
        <div className="footer-logo">
          <div className="logo-icon" style={{width:"22px",height:"22px",borderRadius:"5px",fontSize:"10px",animation:"none"}}>S</div>
          <span style={{fontWeight:"800",fontSize:"13px"}}>
            <span style={{color:"#22d3ee"}}>S</span><span style={{color:"#3b82f6"}}>A</span><span style={{color:"#0ea5e9"}}>A</span><span style={{color:"#e2e8f0"}}>D</span>
          </span>
        </div>
        <div className="footer-sub">All data DOI-verified from peer-reviewed literature · Administrator: <a href={`mailto:${ADMIN_EMAIL}`} className="footer-link">{ADMIN_EMAIL}</a></div>
        <div className="footer-sub">Inspired by SAPdb (Mathur et al., Comput Biol Med 2021) · Primary focus: aggregation & disease · NMR-highlighted structures</div>
        <div className="footer-copy">© 2025 Amal Roy · SAAD v2.0 · Open-access scientific platform · All rights reserved</div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
